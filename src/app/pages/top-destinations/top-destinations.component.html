<div class="bg-surface-container-lowest text-on-surface min-h-screen">

  <!-- Header -->
  <section class="pt-32 pb-16 px-12 max-w-screen-2xl mx-auto">
    <span class="font-label text-[10px] uppercase tracking-[0.4em] text-primary">Handpicked for the Discerning</span>
    <h1 class="font-headline text-5xl md:text-7xl tracking-tighter italic mt-4 text-white">Top Destinations</h1>
    <div class="w-24 h-px bg-primary/30 mt-6"></div>
    <p class="text-on-surface-variant text-lg font-light mt-6 max-w-xl leading-relaxed">
      India's most extraordinary addresses, curated for those who demand more than a room — they demand an experience.
    </p>
  </section>

  <!-- Destinations Grid -->
  <section class="px-12 pb-32 max-w-screen-2xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <a *ngFor="let d of destinations"
        [routerLink]="['/hotels']" [queryParams]="{ q: d.query }"
        class="group relative overflow-hidden rounded-xl cursor-pointer block">

        <!-- Image -->
        <div class="h-80 overflow-hidden">
          <img [src]="d.image" [alt]="d.city"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"/>
        </div>

        <!-- Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>

        <!-- Text -->
        <div class="absolute bottom-0 left-0 p-8 space-y-1">
          <p class="font-label text-[10px] uppercase tracking-[0.3em] text-primary">{{ d.state }}</p>
          <h2 class="font-headline text-3xl text-white italic">{{ d.city }}</h2>
          <p class="text-stone-400 text-sm font-light">{{ d.tagline }}</p>
        </div>

        <!-- Arrow -->
        <div class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-2 group-hover:translate-x-0">
          <span class="material-symbols-outlined text-white text-sm">arrow_forward</span>
        </div>
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[#0e0e0e] w-full py-20 px-12 border-t border-white/5">
    <div class="flex flex-col md:flex-row justify-between items-center gap-8 w-full max-w-screen-2xl mx-auto">
      <div class="font-serif italic text-xl tracking-tighter text-[#f2ca50]" routerLink="/" style="cursor:pointer">LuxeVoyage</div>
      <p class="font-sans text-[10px] tracking-[0.15em] uppercase text-white/40">© 2024 LuxeVoyage. All rights reserved.</p>
    </div>
  </footer>

</div>
